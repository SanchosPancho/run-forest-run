name: Парсинг Telegram IP и доменов

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  unpack-v2ray-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Сборка v2dat
        run: |
          rm -rf v2dat
          git clone https://github.com/urlesistiana/v2dat.git
          cd v2dat
          go build -o v2dat-bin .
          chmod +x v2dat-bin
          cd ..
          cp v2dat/v2dat-bin ./v2dat-bin
          echo "v2dat собран успешно"

      - name: Загрузка geoip.dat и geosite.dat
        run: |
          mkdir -p source-data
          wget -q -O source-data/geoip.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat
          wget -q -O source-data/geosite.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat
          ls -lh source-data/

      # ===== ТОЛЬКО IP-сети Telegram =====
      - name: Извлечение IP-сетей Telegram
        run: |
          mkdir -p unpacked/geoip
          ./v2dat-bin unpack geoip -f telegram -o unpacked/geoip source-data/geoip.dat
          
          if [ -f "unpacked/geoip/geoip_telegram.txt" ]; then
            # Оставляем только IPv4
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$' unpacked/geoip/geoip_telegram.txt > telegram-ips.txt
            COUNT=$(wc -l < telegram-ips.txt)
            echo "IP-сети Telegram (IPv4): $COUNT"
            echo "Примеры:"
            head -5 telegram-ips.txt
          else
            echo "Категория telegram не найдена в geoip.dat"
            echo "# Telegram IP сети не найдены" > telegram-ips.txt
          fi

      # ===== ТОЛЬКО домены из нужных категорий =====
      - name: Извлечение доменов (telegram, youtube, instagram, discord, whatsapp)
        run: |
          CATEGORIES="telegram youtube instagram discord whatsapp"
          mkdir -p unpacked/geosite domains-by-category
          
          ./v2dat-bin unpack geosite -o unpacked/geosite source-data/geosite.dat
          
          for category in telegram youtube instagram discord whatsapp; do
            echo "Обработка: $category"
            
            if [ -f "unpacked/geosite/geosite_${category}.txt" ]; then
              cat "unpacked/geosite/geosite_${category}.txt" | \
                sed 's/^domain://' | \
                sed 's/^full://' | \
                sed 's/^keyword://' | \
                sed 's/^regexp://' | \
                sed 's/@[a-z]*$//' | \
                sed 's/^\*\.//' | \
                grep -v '^@' | \
                grep -v '^regexp:' | \
                grep -v '^keyword:' | \
                grep -E '^[a-zA-Z0-9.*-]' | \
                sort -u > "domains-by-category/${category}.txt"
              
              COUNT=$(wc -l < "domains-by-category/${category}.txt")
              echo "  ✅ $category: $COUNT доменов"
              echo "  Примеры:"
              head -3 "domains-by-category/${category}.txt" | sed 's/^/    /'
            else
              echo "  ❌ Категория '$category' не найдена"
              touch "domains-by-category/${category}.txt"
            fi
          done
          
          # Общий файл из всех категорий
          cat domains-by-category/*.txt 2>/dev/null | sort -u > all-domains.txt
          echo ""
          echo "Всего уникальных доменов: $(wc -l < all-domains.txt)"

      # ===== Формирование итоговой структуры =====
      - name: Подготовка выходных файлов
        run: |
          # Создаём структуру
          mkdir -p latest-data/domains latest-data/ips
          
          # IP-файлы (только Telegram)
          cp telegram-ips.txt latest-data/ips/telegram-ips.txt
          
          # Домены
          cp domains-by-category/telegram.txt latest-data/domains/
          cp domains-by-category/youtube.txt latest-data/domains/
          cp domains-by-category/instagram.txt latest-data/domains/
          cp domains-by-category/discord.txt latest-data/domains/
          cp domains-by-category/whatsapp.txt latest-data/domains/
          cp all-domains.txt latest-data/domains/all-selected-categories.txt
          
          # README
          cat > latest-data/domains/README.md << 'EOF'
          # Список доменов по категориям (очищенные, без префиксов)
          
          | Категория | Количество доменов |
          |-----------|-------------------|
          EOF
          
          for category in telegram youtube instagram discord whatsapp; do
            if [ -f "latest-data/domains/${category}.txt" ]; then
              count=$(wc -l < "latest-data/domains/${category}.txt")
              echo "| $category | $count |" >> latest-data/domains/README.md
            fi
          done
          
          echo "" >> latest-data/domains/README.md
          echo "| **Все категории** | $(wc -l < latest-data/domains/all-selected-categories.txt) |" >> latest-data/domains/README.md
          
          # Информационный файл
          cat > latest-data/info.txt << EOF
          ========================================
          Дата генерации: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          ========================================
          
          Источник: runetfreedom/russia-v2ray-rules-dat
          
          --- IP-сети ---
          Telegram (IPv4): $(wc -l < telegram-ips.txt)
          
          --- Домены (очищенные от префиксов) ---
          telegram: $(wc -l < latest-data/domains/telegram.txt)
          youtube: $(wc -l < latest-data/domains/youtube.txt)
          instagram: $(wc -l < latest-data/domains/instagram.txt)
          discord: $(wc -l < latest-data/domains/discord.txt)
          whatsapp: $(wc -l < latest-data/domains/whatsapp.txt)
          
          Всего уникальных доменов: $(wc -l < latest-data/domains/all-selected-categories.txt)
          ========================================
          EOF
          
          echo "=== ИТОГОВАЯ ИНФОРМАЦИЯ ==="
          cat latest-data/info.txt

      - name: Отправить в репозиторий
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add telegram-ips.txt latest-data/
          git diff --staged --quiet || git commit -m "Обновление: IP-сети Telegram и домены [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: telegram-ips-and-domains
          path: |
            telegram-ips.txt
            latest-data/
          retention-days: 30