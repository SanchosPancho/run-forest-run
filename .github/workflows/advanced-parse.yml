name: Парсинг заблокированных IP и доменов (РКН)

on:
  schedule:
    - cron: '0 */6 * * *'      # каждые 6 часов
  workflow_dispatch:
    inputs:
      geoip_url:
        description: 'Ссылка на geoip.dat (IP-сети)'
        required: false
        default: 'https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat'
      geosite_url:
        description: 'Ссылка на geosite.dat (домены)'
        required: false
        default: 'https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat'
      categories:
        description: 'Категории доменов (через запятую): ru-blocked,telegram,google,netflix,youtube,twitter,openai,discord,facebook,instagram,tiktok,spotify,amazon,microsoft,apple,cloudflare'
        required: false
        default: 'ru-blocked,telegram,google,netflix,youtube,twitter,openai'

jobs:
  parse-geo:
    runs-on: ubuntu-latest
    name: Извлечение IPv4 и доменов по категориям

    steps:
      - name: Получить код репозитория
        uses: actions/checkout@v4

      - name: Установить Go
        run: |
          sudo apt-get update

      - name: Установить geoview (утилита для парсинга)
        run: |
          git clone https://github.com/snowie2000/geoview.git
          cd geoview
          go build -o ../geoview
          cd ..
          chmod +x geoview

      # ========== 1. Парсим IPv4 сети из geoip.dat (игнорируем IPv6) ==========
      - name: Скачать и распарсить geoip.dat (только IPv4)
        run: |
          GEOIP_URL="${{ github.event.inputs.geoip_url }}"
          echo "Скачиваю geoip.dat из: $GEOIP_URL"
          wget -O geoip.dat "$GEOIP_URL"

          # Извлекаем ТОЛЬКО IPv4 сети
          ./geoview -type geoip -input geoip.dat -list "" -output all-ips-raw.txt 2>/dev/null || true

          if [ -f all-ips-raw.txt ]; then
            # Берём только IPv4 (формат: x.x.x.x/xx)
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$' all-ips-raw.txt > ipv4.txt
            sort -u ipv4.txt -o ipv4.txt
          else
            touch ipv4.txt
          fi
          
          echo "Всего IPv4 сетей: $(wc -l < ipv4.txt)"

      # ========== 2. Парсим домены из geosite.dat по категориям ==========
      - name: Скачать и распарсить geosite.dat (домены по категориям)
        run: |
          GEOSITE_URL="${{ github.event.inputs.geosite_url }}"
          echo "Скачиваю geosite.dat из: $GEOSITE_URL"
          wget -O geosite.dat "$GEOSITE_URL"

          CATEGORIES="${{ github.event.inputs.categories }}"
          IFS=',' read -ra CAT_ARRAY <<< "$CATEGORIES"

          # Создаём папку для доменов по категориям
          mkdir -p domains-by-category

          for category in "${CAT_ARRAY[@]}"; do
            category=$(echo "$category" | xargs | tr '[:upper:]' '[:lower:]')
            echo "Извлекаю категорию: $category"

            # Пробуем разные варианты названий категорий
            ./geoview -type geosite -input geosite.dat -list "$category" -output "domains-by-category/${category}.txt" 2>/dev/null || \
            ./geoview -type geosite -input geosite.dat -list "category-$category" -output "domains-by-category/${category}.txt" 2>/dev/null || \
            ./geoview -type geosite -input geosite.dat -list "geosite:$category" -output "domains-by-category/${category}.txt" 2>/dev/null || \
            echo "Предупреждение: категория $category не найдена"

            if [ -f "domains-by-category/${category}.txt" ]; then
              sort -u "domains-by-category/${category}.txt" -o "domains-by-category/${category}.txt"
              sed -i '/^$/d' "domains-by-category/${category}.txt"
              echo "  -> ${category}: $(wc -l < domains-by-category/${category}.txt) доменов"
            else
              touch "domains-by-category/${category}.txt"
              echo "  -> ${category}: 0 доменов (категория не найдена)"
            fi
          done

          # Создаём общий файл со всеми доменами (опционально)
          cat domains-by-category/*.txt 2>/dev/null | sort -u > all-domains.txt 2>/dev/null || touch all-domains.txt
          echo "Всего уникальных доменов: $(wc -l < all-domains.txt 2>/dev/null || echo 0)"

      # ========== 3. Сохраняем результат в репозиторий ==========
      - name: Копируем итоговые файлы
        run: |
          # Основной файл с IPv4 в корне
          cp ipv4.txt ips.txt

          # Создаём структуру папок
          mkdir -p latest-data/domains
          mkdir -p latest-data/ips

          # Копируем IPv4 файлы
          cp ipv4.txt latest-data/ips/ips.txt

          # Копируем все файлы с доменами по категориям
          cp domains-by-category/*.txt latest-data/domains/

          # Копируем общий файл (если нужен)
          cp all-domains.txt latest-data/domains/all-categories.txt

          # Создаём информационный файл
          cat > latest-data/info.txt << EOF
          Сгенерировано: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Источник geoip: ${{ github.event.inputs.geoip_url }}
          Источник geosite: ${{ github.event.inputs.geosite_url }}
          IPv6: ИСКЛЮЧЁН (только IPv4)
          
          --- Категории доменов ---
          ${{ github.event.inputs.categories }}
          
          --- Статистика IPv4 ---
          IPv4 сетей: $(wc -l < ipv4.txt)
          
          --- Статистика доменов по категориям ---
          EOF

          # Добавляем статистику по каждой категории
          for file in domains-by-category/*.txt; do
            if [ -f "$file" ]; then
              catname=$(basename "$file" .txt)
              count=$(wc -l < "$file")
              echo "  $catname: $count доменов" >> latest-data/info.txt
            fi
          done

          echo "" >> latest-data/info.txt
          echo "Всего уникальных доменов (без дублей): $(wc -l < all-domains.txt)" >> latest-data/info.txt

          cat latest-data/info.txt

      - name: Создать README для доменов
        run: |
          cat > latest-data/domains/README.md << 'EOF'
          # Список доменов по категориям
          
          Каждый файл содержит домены для своей категории (один домен на строку).
          
          | Файл | Описание |
          |------|----------|
          EOF

          for file in latest-data/domains/*.txt; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              catname=$(basename "$file" .txt)
              count=$(wc -l < "$file")
              echo "| $filename | $catname ($count доменов) |" >> latest-data/domains/README.md
            fi
          done

      - name: Отправить в репозиторий
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action (парсер)"
          git add ips.txt latest-data/
          git diff --staged --quiet || git commit -m "Автообновление: IPv4 и домены по категориям [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: geo-parsed-data-ipv4-only
          path: |
            ips.txt
            latest-data/
          retention-days: 30