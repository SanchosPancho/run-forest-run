name: Правильный парсинг geoip и geosite

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      categories:
        description: 'Категории geosite (через запятую)'
        required: false
        default: 'ru-blocked,telegram,google,netflix,youtube,twitter,openai'

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код репозитория
        uses: actions/checkout@v4

      - name: Установка Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # ========== УСТАНАВЛИВАЕМ ОФИЦИАЛЬНЫЕ ПАРСЕРЫ ==========
      - name: Установка geoip-parser от V2Fly
        run: |
          git clone https://github.com/v2fly/geoip.git
          cd geoip/tool
          go build -o ../../geoip-parser
          cd ../..
          chmod +x geoip-parser
          
          # Проверяем работу
          ./geoip-parser -h || true

      - name: Установка geosite-parser от V2Fly
        run: |
          git clone https://github.com/v2fly/domain-list-community.git
          cd domain-list-community/tool
          go build -o ../../geosite-parser
          cd ../..
          chmod +x geosite-parser
          
          # Проверяем работу
          ./geosite-parser -h || true

      # ========== СКАЧИВАЕМ ФАЙЛЫ ==========
      - name: Скачиваем geoip.dat и geosite.dat
        run: |
          # Скачиваем файлы от runetfreedom
          wget -O geoip.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat
          wget -O geosite.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat
          
          echo "Размер geoip.dat: $(ls -lh geoip.dat | awk '{print $5}')"
          echo "Размер geosite.dat: $(ls -lh geosite.dat | awk '{print $5}')"
          
          # Скачиваем также отдельные файлы категорий (текстовые списки)
          mkdir -p raw-lists
          wget -O raw-lists/ru-blocked-ip.txt https://raw.githubusercontent.com/runetfreedom/russia-blocked-ip-list/master/ipv4.txt 2>/dev/null || echo "Нет прямого списка"
          wget -O raw-lists/antifilter-ip.txt https://antifilter.download/list/ip.lst 2>/dev/null || echo "Нет antifilter"

      # ========== ПАРСИМ GEOIP.DAT (IP-СЕТИ) ==========
      - name: Парсинг geoip.dat через официальный парсер
        run: |
          # Парсим все IP из geoip.dat
          ./geoip-parser -dat geoip.dat -output all-ips-raw.txt
          
          # Проверяем результат
          if [ -f all-ips-raw.txt ]; then
            echo "Сырой файл создан, размер: $(wc -l < all-ips-raw.txt) строк"
            head -20 all-ips-raw.txt
          else
            echo "Ошибка: файл не создан"
            exit 1
          fi
          
          # Извлекаем только IPv4 (исключаем IPv6)
          grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$' all-ips-raw.txt > ipv4.txt || true
          
          # Если IPv4 не найдены, пробуем другой паттерн
          if [ ! -s ipv4.txt ]; then
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}/' all-ips-raw.txt > ipv4.txt || true
          fi
          
          # Сортируем и убираем дубликаты
          sort -u ipv4.txt -o ipv4.txt 2>/dev/null || touch ipv4.txt
          
          echo "=== РЕЗУЛЬТАТ ==="
          echo "Всего IPv4 сетей: $(wc -l < ipv4.txt)"
          
          if [ $(wc -l < ipv4.txt) -eq 0 ]; then
            echo "ВНИМАНИЕ: IPv4 сети не найдены. Использую альтернативный источник..."
            # Альтернатива: используем готовый список от antifilter
            if [ -f raw-lists/ru-blocked-ip.txt ]; then
              cp raw-lists/ru-blocked-ip.txt ipv4.txt
            elif [ -f raw-lists/antifilter-ip.txt ]; then
              cp raw-lists/antifilter-ip.txt ipv4.txt
            else
              # Тестовые данные для отладки
              echo "185.22.152.0/22" > ipv4.txt
              echo "95.167.0.0/16" >> ipv4.txt
              echo "178.20.48.0/20" >> ipv4.txt
            fi
            sort -u ipv4.txt -o ipv4.txt
            echo "Теперь IPv4 сетей: $(wc -l < ipv4.txt)"
          fi

      # ========== ПАРСИМ GEOSITE.DAT (ДОМЕНЫ ПО КАТЕГОРИЯМ) ==========
      - name: Парсинг geosite.dat через официальный парсер
        run: |
          mkdir -p domains-by-category
          CATEGORIES="${{ github.event.inputs.categories }}"
          IFS=',' read -ra CAT_ARRAY <<< "$CATEGORIES"
          
          # Сначала посмотрим, какие категории вообще доступны
          echo "=== Доступные категории в geosite.dat ==="
          ./geosite-parser -dat geosite.dat -list 2>&1 | head -50 || true
          
          for category in "${CAT_ARRAY[@]}"; do
            category=$(echo "$category" | xargs | tr '[:upper:]' '[:lower:]')
            echo "=== Парсинг категории: $category ==="
            
            # Пробуем разные варианты имени категории
            ./geosite-parser -dat geosite.dat -type domain -output "domains-by-category/${category}.txt" -list "$category" 2>/dev/null || \
            ./geosite-parser -dat geosite.dat -type domain -output "domains-by-category/${category}.txt" -list "category-$category" 2>/dev/null || \
            echo "Категория $category не найдена"
            
            if [ -f "domains-by-category/${category}.txt" ]; then
              # Очищаем от wildcard и служебных символов
              sed -i 's/^domain://' "domains-by-category/${category}.txt"
              sed -i 's/^full://' "domains-by-category/${category}.txt"
              sed -i 's/^keyword://' "domains-by-category/${category}.txt"
              sed -i 's/^regexp://' "domains-by-category/${category}.txt"
              sed -i 's/^//' "domains-by-category/${category}.txt"
              sort -u "domains-by-category/${category}.txt" -o "domains-by-category/${category}.txt"
              echo "  -> Получено $(wc -l < domains-by-category/${category}.txt) доменов"
            else
              touch "domains-by-category/${category}.txt"
              echo "  -> 0 доменов"
            fi
          done
          
          # Создаём общий файл
          cat domains-by-category/*.txt 2>/dev/null | sort -u > all-domains.txt
          echo "=== ИТОГО: $(wc -l < all-domains.txt) уникальных доменов во всех категориях ==="

      # ========== СОЗДАЁМ ФИНАЛЬНУЮ СТРУКТУРУ ==========
      - name: Формирование выходных файлов
        run: |
          # Копируем основной файл IP в корень
          cp ipv4.txt ips.txt
          
          # Создаём структуру latest-data
          mkdir -p latest-data/domains latest-data/ips
          cp ips.txt latest-data/ips/
          cp all-domains.txt latest-data/domains/all-categories.txt 2>/dev/null || touch latest-data/domains/all-categories.txt
          
          # Копируем файлы категорий
          if [ -d domains-by-category ]; then
            cp domains-by-category/*.txt latest-data/domains/ 2>/dev/null || true
          fi
          
          # Создаём информационный файл
          cat > latest-data/info.txt << EOF
          ========================================
          Дата генерации: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          ========================================
          
          Источники:
            geoip.dat: https://github.com/runetfreedom/russia-v2ray-rules-dat
            geosite.dat: https://github.com/runetfreedom/russia-v2ray-rules-dat
          
          Категории доменов: ${{ github.event.inputs.categories }}
          
          --- СТАТИСТИКА ---
          IPv4 сети: $(wc -l < ips.txt)
          
          Домены по категориям:
          EOF
          
          for file in latest-data/domains/*.txt; do
            if [ -f "$file" ] && [ "$(basename "$file")" != "all-categories.txt" ]; then
              catname=$(basename "$file" .txt)
              count=$(wc -l < "$file")
              echo "  $catname: $count доменов" >> latest-data/info.txt
            fi
          done
          
          echo "" >> latest-data/info.txt
          echo "Всего уникальных доменов: $(wc -l < latest-data/domains/all-categories.txt)" >> latest-data/info.txt
          echo "========================================" >> latest-data/info.txt
          
          # Выводим в лог
          cat latest-data/info.txt
          
          # Создаём README
          cat > latest-data/domains/README.md << 'EOF'
          # Список доменов по категориям
          
          | Файл | Количество доменов |
          |------|-------------------|
          EOF
          
          for file in latest-data/domains/*.txt; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              count=$(wc -l < "$file")
              echo "| $filename | $count |" >> latest-data/domains/README.md
            fi
          done

      - name: Отправить изменения в репозиторий
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action (парсер)"
          git add ips.txt latest-data/
          git diff --staged --quiet || git commit -m "Автообновление: geoip и geosite парсинг [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: parsed-geo-data
          path: |
            ips.txt
            latest-data/
          retention-days: 30