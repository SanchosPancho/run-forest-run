name: Парсинг geoip/geosite (Telegram IP + домены)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  unpack-v2ray-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Сборка v2dat
        run: |
          rm -rf v2dat
          git clone https://github.com/urlesistiana/v2dat.git
          cd v2dat
          go build -o v2dat-bin .
          chmod +x v2dat-bin
          cd ..
          cp v2dat/v2dat-bin ./v2dat-bin

      - name: Загрузка geoip.dat и geosite.dat
        run: |
          mkdir -p source-data
          wget -q -O source-data/geoip.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat
          wget -q -O source-data/geosite.dat https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat

      # ===== IP-сети Telegram (отдельно) =====
      - name: Извлечение IP-сетей Telegram
        run: |
          mkdir -p unpacked/geoip
          ./v2dat-bin unpack geoip -f telegram -o unpacked/geoip source-data/geoip.dat
          
          if [ -f "unpacked/geoip/geoip_telegram.txt" ]; then
            # Оставляем только IPv4
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$' unpacked/geoip/geoip_telegram.txt > telegram-ips.txt
            echo "IP-сети Telegram (IPv4): $(wc -l < telegram-ips.txt)"
            cat telegram-ips.txt
          else
            echo "Категория telegram не найдена"
            touch telegram-ips.txt
          fi

      # ===== Все IPv4 сети (общий файл) =====
      - name: Извлечение всех IPv4 сетей
        run: |
          ./v2dat-bin unpack geoip -o unpacked/geoip-all source-data/geoip.dat
          cat unpacked/geoip-all/*.txt 2>/dev/null | \
            grep -E '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$' | \
            sort -u > ips.txt
          echo "Всего IPv4 сетей: $(wc -l < ips.txt)"

      # ===== Домены Telegram и других категорий =====
      - name: Извлечение доменов
        run: |
          CATEGORIES="telegram youtube instagram discord whatsapp"
          mkdir -p unpacked/geosite domains-by-category
          
          ./v2dat-bin unpack geosite -o unpacked/geosite source-data/geosite.dat
          
          for category in telegram youtube instagram discord whatsapp; do
            if [ -f "unpacked/geosite/geosite_${category}.txt" ]; then
              cat "unpacked/geosite/geosite_${category}.txt" | \
                sed 's/^domain://' | \
                sed 's/^full://' | \
                sed 's/^keyword://' | \
                sed 's/^regexp://' | \
                sed 's/@[a-z]*$//' | \
                grep -v '^@' | \
                sort -u > "domains-by-category/${category}.txt"
              echo "$category: $(wc -l < domains-by-category/${category}.txt) доменов"
            else
              touch "domains-by-category/${category}.txt"
            fi
          done
          
          cat domains-by-category/*.txt 2>/dev/null | sort -u > all-domains.txt

      # ===== Формирование итоговой структуры =====
      - name: Подготовка выходных файлов
        run: |
          mkdir -p latest-data/domains latest-data/ips
          
          # IP-файлы
          cp ips.txt latest-data/ips/ipv4.txt
          cp telegram-ips.txt latest-data/ips/telegram-ips.txt
          
          # Домены
          cp domains-by-category/telegram.txt latest-data/domains/
          cp domains-by-category/youtube.txt latest-data/domains/
          cp domains-by-category/instagram.txt latest-data/domains/
          cp domains-by-category/discord.txt latest-data/domains/
          cp domains-by-category/whatsapp.txt latest-data/domains/
          cp all-domains.txt latest-data/domains/all-selected-categories.txt
          
          # Информационный файл
          cat > latest-data/info.txt << EOF
          ========================================
          Дата: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          ========================================
          
          --- IP-сети ---
          Всего IPv4: $(wc -l < ips.txt)
          Telegram IP-сети: $(wc -l < telegram-ips.txt)
          
          --- Домены ---
          telegram: $(wc -l < latest-data/domains/telegram.txt)
          youtube: $(wc -l < latest-data/domains/youtube.txt)
          instagram: $(wc -l < latest-data/domains/instagram.txt)
          discord: $(wc -l < latest-data/domains/discord.txt)
          whatsapp: $(wc -l < latest-data/domains/whatsapp.txt)
          
          Всего уникальных доменов: $(wc -l < latest-data/domains/all-selected-categories.txt)
          ========================================
          EOF
          
          cat latest-data/info.txt

      - name: Отправить в репозиторий
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ips.txt telegram-ips.txt latest-data/
          git diff --staged --quiet || git commit -m "Обновление: IP-сети и домены [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: geo-data
          path: |
            ips.txt
            telegram-ips.txt
            latest-data/
          retention-days: 30